# run: docker-compose up
version: "3"
services:
  webapp:
    container_name: modulearn__webapp
    build:
      context: ./ModuLearn/modulearn/
      dockerfile: ./Dockerfile
    ports:
      - "20600:8000"
    restart: always
    env_file:
      - ./.env
    environment:
      DJANGO_PRODUCTION: "True"
      DJANGO_FORCE_SCRIPT_NAME: "/modulearn"
      STATIC_URL: "/modulearn-static/"
      MEDIA_URL: "/modulearn/media/"
      SERVE_MEDIA_FILES: "True"
    volumes:
      - ./modulearn-storage/db:/modulearn-storage/db
      - ./modulearn-storage/media:/modulearn/media
      - ./.env:/.env:ro
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
      - "adapt2.sis.pitt.edu:172.17.0.1"

# =============================================================================
# PRODUCTION PROXY ROUTING CORRECTION
# =============================================================================
if IS_PRODUCTION:
    class FixProxySlashes:
        def __init__(self, get_response):
            self.get_response = get_response
        def __call__(self, request):
            if request.path_info.startswith('//'):
                request.path_info = '/' + request.path_info.lstrip('/')
            return self.get_response(request)
            
    MIDDLEWARE.insert(0, 'modulearn.settings.FixProxySlashes')