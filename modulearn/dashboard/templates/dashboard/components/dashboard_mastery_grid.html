<!-- Modern Mastery Grid -->
<div class="legacy-analytics-main">
    <div class="card overflow-hidden analytics-card">
        <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div class="flex items-center">
                    <div class="analytics-icon analytics-icon-neutral mr-3">
                        <i class="fas fa-th text-white"></i>
                    </div>
                    <div>
                        <div class="flex items-center gap-2">
                            <h4 class="mb-1 font-bold" id="viewTitle">Mastery Grid</h4>
                        </div>
                        <p class="text-gray-500 dark:text-gray-400 mb-0" id="viewDescription">Click any cell to view detailed progress</p>
                    </div>
                </div>
                <div class="legacy-view-controls">
                    <div id="classAverageLegend" class="grid-status-legend hidden" aria-label="Cell status legend">
                        <span><span class="legend-symbol c-done">✓</span> completed</span>
                        <span><span class="legend-symbol c-prog">⏵</span> in progress</span>
                        <span><span class="legend-symbol c-none">○</span> not started</span>
                        <label class="breakdown-toggle" for="showAllBreakdownsToggle">
                            <input type="checkbox" id="showAllBreakdownsToggle">
                            <span>Show all breakdowns</span>
                        </label>
                    </div>
                    <div class="legacy-view-tabs" role="group" aria-label="Analytics view mode">
                        <div class="legacy-view-tab-wrap">
                            <button type="button" id="classAverageHelpBtn" class="legacy-help-chip legacy-help-chip-success" data-bs-toggle="modal" data-bs-target="#classAverageHelpModal" aria-label="Class Average Help" title="Class Average Help">?</button>
                            <input type="radio" class="btn-check" name="viewMode" id="classAverage" value="classAverage">
                            <label class="btn btn-outline-success legacy-view-tab" for="classAverage">
                                <i class="fas fa-users mr-1"></i>Class Average
                            </label>
                        </div>
                        <div class="legacy-view-tab-wrap">
                            <button type="button" id="perStudentHelpBtn" class="legacy-help-chip legacy-help-chip-primary" data-bs-toggle="modal" data-bs-target="#perStudentHelpModal" aria-label="Per Student Help" title="Per Student Help">?</button>
                            <input type="radio" class="btn-check" name="viewMode" id="perStudent" value="perStudent">
                            <label class="btn btn-outline-primary legacy-view-tab" for="perStudent">
                                <i class="fas fa-list mr-1"></i>Per Student
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="p-0">
            <!-- Mastery Grid View -->
            <div class="overflow-x-auto">
                <table class="table mb-0 custom-table" id="masteryGrid">
                    <thead>
                        <tr id="gridHeaders">
                            <th class="border-0 font-bold py-2 text-center" style="min-width: 250px;">
                                <div class="flex flex-col items-center">
                                    <i class="fas fa-graduation-cap text-blue-600 mb-1"></i>
                                    Topics
                                </div>
                            </th>
                        </tr>
                    </thead>
                    <tbody id="gridBody">
                        <!-- Dynamic grid content will be inserted here -->
                    </tbody>
                </table>
            </div>
            
            <!-- Per Student View - Hidden by default, content will be swapped in -->
            <div id="perStudentContent" style="display: none;">
                <div class="student-table-controls">
                    <label for="studentFilterInput" class="student-filter-label">Find Student</label>
                    <div class="student-filter-box">
                        <i class="fas fa-search"></i>
                        <input type="search" id="studentFilterInput" class="student-filter-input" placeholder="Search by ID, name, or email">
                    </div>
                    <div class="student-filter-count" id="studentFilterCount"></div>
                </div>
                <div class="overflow-x-auto student-table-wrap">
                    <table class="table table-hover mb-0 custom-table" id="studentTable">
                        <thead>
                            <tr>
                                <th class="border-0 font-bold py-2 text-left">
                                    <button type="button" class="sortable-th text-left" data-student-sort="student">
                                        <i class="fas fa-user-graduate text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Student</span>
                                        <span class="sort-indicator" data-sort-indicator="student"></span>
                                    </button>
                                </th>
                                <th class="border-0 font-bold py-2 text-center">
                                    <button type="button" class="sortable-th" data-student-sort="progress">
                                        <i class="fas fa-chart-line text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Overall Progress</span>
                                        <span class="sort-indicator" data-sort-indicator="progress"></span>
                                    </button>
                                </th>
                                <th class="border-0 font-bold py-2 text-center">
                                    <button type="button" class="sortable-th" data-student-sort="topics">
                                        <i class="fas fa-book text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Topics</span>
                                        <span class="sort-indicator" data-sort-indicator="topics"></span>
                                    </button>
                                </th>
                                <th class="border-0 font-bold py-2 text-center">
                                    <button type="button" class="sortable-th" data-student-sort="profile">
                                        <i class="fas fa-layer-group text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Resource Profile</span>
                                        <span class="sort-indicator" data-sort-indicator="profile"></span>
                                    </button>
                                </th>
                                <th class="border-0 font-bold py-2 text-center">
                                    <button type="button" class="sortable-th" data-student-sort="lastActive">
                                        <i class="fas fa-clock text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Last Active</span>
                                        <span class="sort-indicator" data-sort-indicator="lastActive"></span>
                                    </button>
                                </th>
                                <th class="border-0 font-bold py-2 text-center">
                                    <button type="button" class="sortable-th" data-student-sort="open">
                                        <i class="fas fa-chart-bar text-blue-600 mb-1" style="font-size: 0.8rem;"></i>
                                        <span style="font-size: 0.8rem;">Open</span>
                                        <span class="sort-indicator" data-sort-indicator="open"></span>
                                    </button>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Dynamic student rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
