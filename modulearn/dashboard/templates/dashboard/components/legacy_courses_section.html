<section class="mb-8">
  <div class="card overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
        <div>
          <h2 class="text-lg font-semibold mb-0.5">Legacy Courses (MasteryGrids)</h2>
          <p class="text-sm text-gray-500 dark:text-gray-400" id="legacyGroupsMeta">Loading linked legacy courses...</p>
        </div>
        <div class="flex items-center gap-2 w-full md:w-auto md:max-w-sm">
          <div class="relative flex-1">
            <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" class="form-control input-with-icon" id="legacyGroupsSearch" placeholder="Search courses..." disabled>
          </div>
          <button class="btn btn-sm btn-outline-secondary hidden" id="clearLegacySearch">
            <i class="bi bi-x-lg"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="p-6">
      <div class="legacy-groups-container max-h-[500px] overflow-y-auto">
        <div id="legacyGroupsLoading" class="text-center py-12">
          <div class="spinner-border loading-spin text-blue-600" role="status" aria-label="Loading legacy courses"></div>
          <p class="text-gray-400 mt-3">Loading linked legacy courses...</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 hidden" id="legacyGroupsContainer"></div>
        <div id="legacyGroupsEmpty" class="hidden text-center py-12">
          <i class="bi bi-search text-gray-300 dark:text-gray-600 text-4xl"></i>
          <p class="text-gray-400 mt-3">No legacy courses to show.</p>
        </div>
      </div>
    </div>
  </div>
</section>
