<section class="hero-shell shell-surface shell-surface-strong mb-8">
  <div class="mt-4 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="max-w-3xl">
      <h1 class="text-4xl md:text-5xl font-bold">{{ title }}</h1>
      {% if description %}
        <p class="mt-3 text-lg text-slate-600 dark:text-slate-300">{{ description }}</p>
      {% endif %}
    </div>
    {% if actions %}
      <div class="flex flex-wrap gap-3">
        {{ actions }}
      </div>
    {% endif %}
  </div>
</section>
