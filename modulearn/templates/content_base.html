<!doctype html>
<html lang="en">
  <head>
    {% load static %}
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#f4f8fc">
    <title>{% block title %}ModuLearn Content{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('theme');
        var isDark = savedTheme ? savedTheme === 'dark' : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/tailwind.generated.css' %}" rel="stylesheet">
    <link href="{% static 'css/design-system.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
  </head>
  <body class="content-shell-body min-h-screen p-0">
    <div class="shell-background"></div>
    <main class="w-full flex flex-col">
      {% block content %}{% endblock %}
    </main>
    {% include 'includes/app_footer.html' %}
    <script src="{% static 'js/bootstrap-compat.js' %}"></script>
    <script src="{% static 'js/app-shell.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
