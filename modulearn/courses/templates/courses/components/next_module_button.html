<a href="{% if next_module %}{% url 'courses:launch_iframe_module' course_instance.id next_module.id %}{% else %}#{% endif %}"
   class="btn {% if next_module %}btn-primary{% else %}btn-outline-secondary{% endif %} {{ button_class|default:'' }}"
   title="{% if next_module %}Open {{ next_module.title }}{% else %}Check for the next unlocked module{% endif %}"
   data-next-module-button
   data-next-url="{% url 'courses:next_accessible_module' course_instance.id module.id %}"
   data-ready-label="Next Module"
   data-checking-label="Checking..."
   data-empty-label="No Unlocked Module"
   data-error-label="Try Again">
  <span data-next-label>{% if next_module %}Next Module{% else %}Check Next Module{% endif %}</span>
  <i class="bi {% if next_module %}bi-arrow-right{% else %}bi-search{% endif %}" aria-hidden="true" data-next-icon></i>
</a>
